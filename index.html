<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>九万亩联盟战区地图</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
  body { margin:0; padding:0; font-family: sans-serif; }
  #map { height: 80vh; width: 100%; }
  #controls { padding:10px; background:#f0f0f0; }
  #search { width: 100%; padding:5px; font-size:16px; margin-bottom:5px; }
  .alliance-checkbox { margin-right:10px; }
</style>
</head>
<body>

<div id="controls">
  <input type="text" id="search" placeholder="搜索玩家名字..."><br>
  <div id="alliances"></div>
</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
// 初始化地图
var map = L.map('map', {crs: L.CRS.Simple, minZoom:-1});
var bounds = [[0,0],[600,600]];
map.fitBounds(bounds);

// 添加网格线
for(var i=0;i<=600;i+=50){
  L.polyline([[0,i],[600,i]], {color:'#ccc',weight:1}).addTo(map);
  L.polyline([[i,0],[i,600]], {color:'#ccc',weight:1}).addTo(map);
}

// 全部玩家点集合
var allMarkers = [];
var allianceColors = {}; // 动态生成颜色
var activeAlliances = new Set();

// Apps Script Web App URL (替换为你的)
var jsonUrl = "https://script.google.com/macros/s/AKfycbyBlLwGA1y7aB_6_yXUeWh5UUa1bMA4IghG667wbdtri1MTyNufgUUdrm6JXd35LLT1/exec";

// 生成随机颜色
function getRandomColor(){
  var letters = '0123456789ABCDEF';
  var color = '#';
  for(var i=0;i<6;i++){
    color += letters[Math.floor(Math.random()*16)];
  }
  return color;
}

// 安全生成 id（联盟名字里有空格或特殊字符也能用）
function safeId(str){
  return str.replace(/\W/g,'_');
}

// 创建联盟复选框
function createAllianceCheckbox(alliance){
  var id = safeId(alliance);
  if(document.getElementById('chk_'+id)) return; // 已存在
  var checkbox = document.createElement('input');
  checkbox.type = 'checkbox';
  checkbox.checked = true;
  checkbox.className = 'alliance-checkbox';
  checkbox.id = 'chk_'+id;
  checkbox.addEventListener('change', updateAllianceVisibility);
  document.getElementById('alliances').appendChild(checkbox);
  
  var label = document.createElement('label');
  label.htmlFor = 'chk_'+id;
  label.innerText = alliance;
  label.style.marginRight='15px';
  document.getElementById('alliances').appendChild(label);
}

// 加载 JSON 并更新地图
function loadPlayers(){
  fetch(jsonUrl + "?t=" + new Date().getTime())
    .then(res => res.json())
    .then(data => {
      // 清理旧点
      allMarkers.forEach(m => map.removeLayer(m));
      allMarkers = [];
      document.getElementById('alliances').innerHTML = '';
      activeAlliances.clear();

data.forEach(row=>{
  var name = row["玩家"];        // 修正为实际字段
  var alliance = row["联盟名字"]; // 修正为实际字段
  var x = parseFloat(row["X坐标"]);
  var y = parseFloat(row["Y坐标"]);

  if(!allianceColors[alliance]) allianceColors[alliance] = getRandomColor();
  createAllianceCheckbox(alliance);
  activeAlliances.add(safeId(alliance));

  var marker = L.circleMarker([y,x], {
    radius:6,
    color: allianceColors[alliance],
    fillColor: allianceColors[alliance],
    fillOpacity:1
  }).addTo(map)
  .bindPopup("玩家："+name+"<br>联盟："+alliance+"<br>坐标:("+x+","+y+")");

  marker.playerName = name.toLowerCase();
  marker.alliance = alliance;
  allMarkers.push(marker);
});

      updateAllianceVisibility();
    }).catch(err=>{
      console.error("读取 JSON 失败:", err);
    });
}

// 更新显示状态（搜索 + 联盟开关）
function updateAllianceVisibility(){
  activeAlliances.clear();
  Array.from(document.getElementsByClassName('alliance-checkbox')).forEach(cb=>{
    if(cb.checked) activeAlliances.add(cb.id.replace('chk_',''));
  });
  
  var query = searchInput.value.toLowerCase();
  allMarkers.forEach(marker=>{
    var id = safeId(marker.alliance);
    if(activeAlliances.has(id) && marker.playerName.includes(query)){
      marker.setStyle({opacity:1, fillOpacity:1});
      marker.bringToFront();
    } else {
      marker.setStyle({opacity:0, fillOpacity:0});
    }
  });
}

// 搜索功能
var searchInput = document.getElementById('search');
searchInput.addEventListener('input', updateAllianceVisibility);

// 初始加载
loadPlayers();
// 自动刷新，每10秒
setInterval(loadPlayers, 10000);

</script>
</body>
</html>
